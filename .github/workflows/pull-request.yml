name: Test Gnosys

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-toolbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Toolbox Containerfile
        id: toolbox_cache
        uses: actions/cache@v4
        with:
          path: /tmp/gnosys-box.tar
          key: containerfile-${{ hashFiles('images/toolbox/Containerfile') }}
          restore-keys: |
            containerfile-

      - name: Install System Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y podman
        if: steps.toolbox_cache.outputs.cache-hit != 'true'

      - name: Build Toolbox Image
        run: |
          podman build -t localhost/gnosys-box:latest .
          podman save localhost/gnosys-box:latest -o /tmp/gnosys-box.tar
        working-directory: images/toolbox
        if: steps.toolbox_cache.outputs.cache-hit != 'true'

      - name: Store Image Tarball
        uses: actions/upload-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/gnosys-box.tar

  test-gnosys:
    runs-on: ubuntu-latest
    needs: build-toolbox
    strategy:
      matrix:
        include:
          - name: gnosys
            target: test/types/gnosys test/gnosys
            workdir: gnosys
          - name: gnosys_sample
            target: test/types/gnosys_sample test/gnosys_sample
            workdir: gnosys
          - name: docs
            target: html
            workdir: docs

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: toolbox-image
          path: /tmp

      - name: Load Toolbox Image
        run: podman load -i /tmp/gnosys-box.tar

      - name: Test Gnosys / ${{ matrix.name }}
        run: |
          podman run -it --rm -v $PWD:/workspace -w /workspace localhost/gnosys-box:latest make ${{ matrix.target }}
        working-directory: ${{ matrix.workdir}}
